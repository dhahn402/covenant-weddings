<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Marcellus&family=Great+Vibes&display=swap" rel="stylesheet"/>
<style>
  :root{--ivory:#fdfbf6;--cream:#f5efe4;--sage:#6f7d63;--sage-dk:#55614b;--gold:#b3924f;--ink:#3b352c;--muted:#9a8f7d}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--cream);font-family:"Marcellus",serif;color:var(--ink);padding:30px}
  h1{text-align:center;font-family:"Cormorant Garamond";font-size:32px;color:var(--sage-dk)}
  .sub{text-align:center;color:var(--muted);font-size:12px;letter-spacing:.2em;text-transform:uppercase;margin:4px 0 26px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px;max-width:760px;margin:0 auto}
  .card{background:var(--ivory);border:1px solid #e8e0d2;border-radius:12px;padding:24px 16px 40px;text-align:center;position:relative}
  .card svg{width:100%;height:auto;max-width:300px}
  .num{position:absolute;top:10px;left:14px;font-family:"Cormorant Garamond";color:var(--gold);font-size:15px}
  .label{position:absolute;bottom:12px;left:0;right:0;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  text{fill:var(--ink)} .g{fill:var(--gold)} .s{fill:var(--sage-dk)} .strokeG{stroke:var(--gold);fill:none} .strokeS{stroke:var(--sage-dk);fill:none}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}
</style></head>
<body>
  <h1>Ever &amp; Amen — Rooster &amp; Wave Crest</h1>
  <p class="sub">The Hahn rooster meets the Carolina coast · Sébastien draws the final rooster line-art</p>
  <div class="grid">

    <!-- D: Rooster over wave -->
    <div class="card"><span class="num">D</span>
      <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <defs><path id="Dtop" d="M42,150 a108,108 0 0,1 216,0" fill="none"/></defs>
        <circle cx="150" cy="150" r="126" class="strokeG" stroke-width="2.5"/>
        <circle cx="150" cy="150" r="116" class="strokeG" stroke-width="1"/>
        <text font-family="Marcellus" font-size="18" letter-spacing="4" class="g" text-anchor="middle">
          <textPath href="#Dtop" startOffset="50%">EVER &#8226; AMEN</textPath></text>
        <circle cx="33" cy="150" r="3" class="g"/><circle cx="267" cy="150" r="3" class="g"/>
        <!-- rooster (emoji stand-in — Sébastien draws custom line-art) -->
        <text x="150" y="150" font-size="66" text-anchor="middle">&#128019;</text>
        <!-- coastal wave -->
        <path d="M78,172 q18,-15 36,0 t36,0 t36,0 t36,0" class="strokeG" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M92,182 q15,-11 30,0 t30,0 t30,0" class="strokeS" stroke-width="1.6" stroke-linecap="round" opacity=".55"/>
        <text x="150" y="212" font-family="Marcellus" font-size="10.5" letter-spacing="3" class="s" text-anchor="middle">TWO ARE BETTER THAN ONE</text>
        <text x="150" y="230" font-family="Marcellus" font-size="9" letter-spacing="3" fill="#9a8f7d" text-anchor="middle">NEW BERN, NC</text>
      </svg>
      <div class="label">D · Rooster over the wave</div>
    </div>

    <!-- E: Monogram + wave, rooster crown -->
    <div class="card"><span class="num">E</span>
      <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <defs><path id="Etop" d="M50,150 a100,100 0 0,1 200,0" fill="none"/></defs>
        <circle cx="150" cy="150" r="118" class="strokeS" stroke-width="2"/>
        <text font-family="Marcellus" font-size="15" letter-spacing="4" class="s" text-anchor="middle">
          <textPath href="#Etop" startOffset="50%">EVER &amp; AMEN</textPath></text>
        <text x="150" y="108" font-size="30" text-anchor="middle">&#128019;</text>
        <text x="150" y="182" font-family="Cormorant Garamond" font-weight="700" font-size="62" class="s" text-anchor="middle">E<tspan class="g">&amp;</tspan>A</text>
        <path d="M86,198 q16,-13 32,0 t32,0 t32,0" class="strokeG" stroke-width="2.2" stroke-linecap="round"/>
        <text x="150" y="228" font-family="Great Vibes" font-size="26" class="g" text-anchor="middle">Two are better than one</text>
      </svg>
      <div class="label">E · Rooster crown &amp; wave</div>
    </div>

  </div>
</body></html>
