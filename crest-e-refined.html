<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Marcellus&display=swap" rel="stylesheet"/>
<style>
  :root{--ivory:#fdfbf6;--cream:#f5efe4;--sage:#6f7d63;--sage-dk:#55614b;--gold:#a9863f;--ink:#3b352c;--muted:#9a8f7d}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--cream);font-family:"Marcellus",serif;color:var(--ink);padding:30px}
  h1{text-align:center;font-family:"Cormorant Garamond";font-size:32px;color:var(--sage-dk)}
  .sub{text-align:center;color:var(--muted);font-size:12px;letter-spacing:.18em;text-transform:uppercase;margin:4px 0 26px}
  .grid{display:grid;grid-template-columns:1.2fr 1fr;gap:22px;max-width:820px;margin:0 auto}
  .grid.two{grid-template-columns:1fr 1.4fr;margin-top:22px}
  .card{background:var(--ivory);border:1px solid #e8e0d2;border-radius:12px;padding:24px 16px 40px;text-align:center;position:relative;display:flex;align-items:center;justify-content:center}
  .card svg{width:100%;height:auto;max-width:290px}
  .label{position:absolute;bottom:12px;left:0;right:0;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  text{fill:var(--ink)} .g{fill:var(--gold)} .s{fill:var(--sage-dk)} .strokeG{stroke:var(--gold);fill:none} .strokeS{stroke:var(--sage-dk);fill:none}
  @media(max-width:680px){.grid,.grid.two{grid-template-columns:1fr}}
</style></head>
<body>
  <h1>Ever &amp; Amen — Crest E, Refined by the Masters</h1>
  <p class="sub">Rooster = hero · thicker strokes · legible tagline · full system · Sébastien draws the final rooster</p>

  <div class="grid">
    <!-- Refined full crest -->
    <div class="card">
      <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <defs><path id="Rtop" d="M52,150 a98,98 0 0,1 196,0" fill="none"/></defs>
        <circle cx="150" cy="150" r="122" class="strokeS" stroke-width="3"/>
        <circle cx="150" cy="150" r="112" class="strokeG" stroke-width="1"/>
        <text font-family="Marcellus" font-size="15" letter-spacing="4.5" class="s" text-anchor="middle">
          <textPath href="#Rtop" startOffset="50%">EVER &amp; AMEN</textPath></text>
        <circle cx="41" cy="150" r="2.6" class="g"/><circle cx="259" cy="150" r="2.6" class="g"/>
        <!-- rooster HERO (emoji stand-in; final = custom silhouette) -->
        <text x="150" y="132" font-size="58" text-anchor="middle">&#128019;</text>
        <path d="M96,150 q17,-14 34,0 t34,0 t34,0" class="strokeG" stroke-width="3" stroke-linecap="round"/>
        <text x="150" y="194" font-family="Cormorant Garamond" font-weight="700" font-size="40" class="s" text-anchor="middle">E<tspan class="g">&amp;</tspan>A</text>
        <text x="150" y="216" font-family="Marcellus" font-size="7.5" letter-spacing="1.4" class="s" text-anchor="middle">TWO ARE BETTER THAN ONE</text>
      </svg>
      <div class="label">1 · Refined full crest</div>
    </div>

    <!-- Icon -->
    <div class="card">
      <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <circle cx="150" cy="150" r="120" class="strokeS" stroke-width="4"/>
        <text x="150" y="150" font-size="96" text-anchor="middle">&#128019;</text>
        <path d="M78,182 q24,-18 48,0 t48,0" class="strokeG" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <div class="label">2 · The icon (favicon / avatar)</div>
    </div>
  </div>

  <div class="grid two">
    <!-- tiny mono proof -->
    <div class="card" style="background:var(--sage-dk)">
      <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <circle cx="150" cy="150" r="120" fill="none" stroke="#fdfbf6" stroke-width="4"/>
        <text x="150" y="150" font-size="96" text-anchor="middle">&#128019;</text>
        <path d="M78,182 q24,-18 48,0 t48,0" fill="none" stroke="#fdfbf6" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <div class="label" style="color:#cbb98a">3 · Works reversed (Haviv test)</div>
    </div>

    <!-- horizontal lockup -->
    <div class="card" style="justify-content:flex-start;gap:18px">
      <svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg" style="max-width:96px;flex:none">
        <circle cx="75" cy="75" r="60" class="strokeS" stroke-width="3"/>
        <text x="75" y="76" font-size="52" text-anchor="middle">&#128019;</text>
        <path d="M40,92 q12,-9 24,0 t24,0" class="strokeG" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <div style="text-align:left">
        <div style="font-family:'Cormorant Garamond';font-weight:700;font-size:30px;color:var(--sage-dk);line-height:1">EVER <span class="g" style="color:var(--gold)">&amp;</span> AMEN</div>
        <div style="font-family:'Marcellus';font-size:10px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-top:4px">Wedding Studio · New Bern</div>
      </div>
      <div class="label">4 · Horizontal lockup</div>
    </div>
  </div>
</body></html>
